<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Simulateur de Combat</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d0d0f;
      --surface: #14141a;
      --border: #2a2535;
      --gold: #c9a84c;
      --gold-light: #e8c96a;
      --gold-dim: #6b5520;
      --red: #c0392b;
      --red-light: #e74c3c;
      --blue: #1a6fa8;
      --blue-light: #2980b9;
      --text: #e8e0d0;
      --text-dim: #7a7060;
      --win-att: #2ecc71;
      --win-def: #e74c3c;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Crimson Text', Georgia, serif;
      min-height: 100vh;
      padding: 0 0 40px;
      background-image:
        radial-gradient(ellipse at 10% 0%, #1a0a0022 0%, transparent 50%),
        radial-gradient(ellipse at 90% 100%, #0a0a1a22 0%, transparent 50%);
    }

    /* HEADER */
    header {
      text-align: center;
      padding: 28px 20px 20px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, #18121a 0%, transparent 100%);
    }
    header .eyebrow {
      font-family: 'Cinzel', serif;
      font-size: 13px;
      letter-spacing: 6px;
      color: var(--gold-dim);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    header h1 {
      font-family: 'Cinzel', serif;
      font-size: 36px;
      font-weight: 900;
      color: var(--gold);
      text-shadow: 0 0 30px #c9a84c44;
      letter-spacing: 2px;
    }
    .divider {
      width: 80px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
      margin: 10px auto 0;
    }

    /* MAIN LAYOUT */
    main { padding: 20px 16px; max-width: 480px; margin: 0 auto; }

    /* SECTION TITLE */
    .section-label {
      font-family: 'Cinzel', serif;
      font-size: 13px;
      letter-spacing: 5px;
      color: var(--gold-dim);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    /* CAMPS GRID */
    .camps {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }
    .camp {
      background: var(--surface);
      border-radius: 12px;
      padding: 16px;
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }
    .camp::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
    }
    .camp.attaquant::before { background: linear-gradient(90deg, var(--red), transparent); }
    .camp.defenseur::before { background: linear-gradient(90deg, var(--blue), transparent); }

    .camp-title {
      font-family: 'Cinzel', serif;
      font-size: 16px;
      letter-spacing: 2px;
      margin-bottom: 14px;
    }
    .camp.attaquant .camp-title { color: var(--red-light); }
    .camp.defenseur .camp-title { color: var(--blue-light); }

    .field { margin-bottom: 12px; }
    .field label {
      display: block;
      font-size: 16px;
      color: var(--text-dim);
      letter-spacing: 1px;
      margin-bottom: 5px;
    }
    .field input[type=number] {
      width: 100%;
      background: #0d0d0f;
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-family: 'Cinzel', serif;
      font-size: 25px;
      font-weight: 700;
      text-align: center;
      padding: 8px 4px;
      -moz-appearance: textfield;
      outline: none;
      transition: border-color 0.2s;
    }
    .field input[type=number]:focus { border-color: var(--gold-dim); }
    .field input[type=number]::-webkit-outer-spin-button,
    .field input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }

    .hint { font-size: 14px; color: var(--text-dim); margin-top: 3px; text-align: center; }

    /* MODE */
    .mode-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .mode-row span {
      font-size: 18px;
      color: var(--text-dim);
      letter-spacing: 0.5px;
    }
    .toggle {
      display: flex;
      background: #0d0d0f;
      border-radius: 8px;
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .toggle button {
      padding: 7px 14px;
      font-family: 'Cinzel', serif;
      font-size: 14px;
      letter-spacing: 1px;
      border: none;
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.2s;
    }
    .toggle button.active {
      background: var(--gold-dim);
      color: var(--gold-light);
    }

    /* BUTTONS */
    .btn-launch {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #2a1f0a, #3d2e10);
      border: 1px solid var(--gold-dim);
      border-radius: 12px;
      color: var(--gold);
      font-family: 'Cinzel', serif;
      font-size: 19px;
      letter-spacing: 3px;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      box-shadow: 0 4px 20px #c9a84c18;
      margin-bottom: 10px;
    }
    .btn-launch:hover, .btn-launch:active {
      background: linear-gradient(135deg, #3d2e10, #5a4418);
      box-shadow: 0 4px 28px #c9a84c33;
    }
    .btn-launch:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-suivant {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #0a1a2a, #102a3d);
      border: 1px solid #1a4a6b;
      border-radius: 12px;
      color: var(--blue-light);
      font-family: 'Cinzel', serif;
      font-size: 17px;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      display: none;
      margin-bottom: 10px;
    }
    .btn-suivant.visible { display: block; }
    .btn-suivant:hover { background: linear-gradient(135deg, #102a3d, #154e72); }

    /* ERROR */
    .error-box {
      background: #1a0808;
      border: 1px solid #5a1a1a;
      border-radius: 10px;
      padding: 12px 14px;
      color: #e05555;
      font-size: 18px;
      margin-bottom: 14px;
      display: none;
    }
    .error-box.visible { display: block; }

    /* RESULT FINAL */
    .result-final {
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      margin-bottom: 16px;
      display: none;
      animation: fadeIn 0.4s ease;
    }
    .result-final.visible { display: block; }
    .result-final.attaquant-win {
      background: #0a1f0a;
      border: 1px solid #1a5a1a;
    }
    .result-final.defenseur-win {
      background: #1f0a0a;
      border: 1px solid #5a1a1a;
    }
    .result-final .verdict {
      font-family: 'Cinzel', serif;
      font-size: 22px;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }
    .result-final.attaquant-win .verdict { color: var(--win-att); }
    .result-final.defenseur-win .verdict { color: var(--win-def); }
    .result-final .sub { font-size: 18px; color: var(--text-dim); }

    /* ROUNDS LOG */
    .log-container {
      display: none;
    }
    .log-container.visible { display: block; }

    .log-header {
      font-family: 'Cinzel', serif;
      font-size: 13px;
      letter-spacing: 5px;
      color: var(--gold-dim);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .round-entry {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 14px;
      margin-bottom: 8px;
      font-size: 19px;
      line-height: 1.6;
      animation: slideIn 0.3s ease;
      border-left: 3px solid transparent;
    }
    .round-entry.att-loss { border-left-color: var(--red); }
    .round-entry.def-loss { border-left-color: var(--blue); }
    .round-entry.both-loss { border-left-color: var(--gold-dim); }

    .round-num {
      font-family: 'Cinzel', serif;
      font-size: 14px;
      letter-spacing: 2px;
      color: var(--gold-dim);
      margin-bottom: 5px;
    }
    .round-dice {
      display: flex;
      gap: 16px;
      margin-bottom: 6px;
      flex-wrap: wrap;
    }
    .dice-group { font-size: 18px; }
    .dice-group .who {
      font-size: 14px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .dice-group.att .who { color: var(--red-light); }
    .dice-group.def .who { color: var(--blue-light); }
    .dice-val {
      font-family: 'Cinzel', serif;
      font-weight: 700;
      font-size: 23px;
    }
    .dice-group.att .dice-val { color: var(--red-light); }
    .dice-group.def .dice-val { color: var(--blue-light); }

    .round-outcome { font-size: 18px; color: var(--text-dim); }
    .round-outcome b { color: var(--text); font-weight: 600; }
    .round-score {
      font-size: 17px;
      color: var(--text-dim);
      margin-top: 4px;
      font-style: italic;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.97); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>

<header>
  <div class="eyebrow">Risk</div>
  <h1>Iberia 1080</h1>
  <div class="divider"></div>
</header>

<main>

  <!-- CAMPS -->
  <div class="section-label">Paramètres</div>
  <div class="camps">
    <div class="camp attaquant">
      <div class="camp-title">Attaquant</div>
      <div class="field">
        <label>Pions</label>
        <input type="number" id="pionsAtt" value="5" min="1" max="99" />
      </div>
      <div class="field">
        <label>Dés</label>
        <input type="number" id="desAtt" value="3" min="1" max="3" />
        <div class="hint">1 – 3 dés</div>
      </div>
    </div>
    <div class="camp defenseur">
      <div class="camp-title">Défenseur</div>
      <div class="field">
        <label>Pions</label>
        <input type="number" id="pionsDef" value="3" min="1" max="99" />
      </div>
      <div class="field">
        <label>Dés</label>
        <input type="number" id="desDef" value="2" min="1" max="2" />
        <div class="hint">1 – 2 dés</div>
      </div>
    </div>
  </div>

  <!-- MODE -->
  <div class="mode-row">
    <span>Mode de jeu</span>
    <div class="toggle">
      <button id="btnModeInstant" class="active" onclick="setMode(1)">Instantané</button>
      <button id="btnModeEtape" onclick="setMode(2)">Par étape</button>
    </div>
  </div>

  <!-- ERROR -->
  <div class="error-box" id="errorBox"></div>

  <!-- BOUTONS -->
  <button class="btn-launch" id="btnLancer" onclick="lancerCombat()">Lancer le combat</button>
  <button class="btn-suivant" id="btnSuivant" onclick="lancerSuivant()">Tour suivant</button>

  <!-- RÉSULTAT FINAL -->
  <div class="result-final" id="resultFinal">
    <div class="verdict" id="verdictText"></div>
    <div class="sub" id="verdictSub"></div>
  </div>

  <!-- LOG DES ROUNDS -->
  <div class="log-container" id="logContainer">
    <div class="log-header">Détail des tours</div>
    <div id="logEntries"></div>
  </div>

</main>

<script>
  let modeJeu = 1;
  let pionsAttG, pionsDefG, desAttG, desDefG, ligneRound;

  function setMode(m) {
    modeJeu = m;
    document.getElementById('btnModeInstant').classList.toggle('active', m === 1);
    document.getElementById('btnModeEtape').classList.toggle('active', m === 2);
  }

  function showError(msg) {
    const b = document.getElementById('errorBox');
    b.textContent = msg;
    b.classList.add('visible');
  }
  function hideError() {
    document.getElementById('errorBox').classList.remove('visible');
  }

  function valider(pAtt, pDef, dAtt, dDef) {
    if (pAtt <= 0 || pDef <= 0) { showError("Il faut au moins 1 pion pour chaque camp."); return false; }
    if (dAtt < 1 || dAtt > 3) { showError("L'attaquant doit utiliser entre 1 et 3 dés."); return false; }
    if (dDef < 1 || dDef > 2) { showError("Le défenseur doit utiliser entre 1 et 2 dés."); return false; }
    return true;
  }

  function rnd6() { return Math.floor(Math.random() * 6) + 1; }

  function lancerDes(n) {
    return Array.from({length: n}, rnd6).sort((a,b) => b - a);
  }

  function arrayToString(arr) {
    if (arr.length === 1) return String(arr[0]);
    return arr.slice(0, -1).join(', ') + ' et ' + arr[arr.length - 1];
  }

  function executerRound(pAtt, pDef, dAtt, dDef) {
    const att = lancerDes(dAtt);
    const def = lancerDes(dDef);
    const nb = Math.min(dAtt, dDef);
    let perteAtt = 0, perteDef = 0;
    for (let i = 0; i < nb; i++) {
      if (att[i] > def[i]) perteDef++;
      else perteAtt++;
    }
    return { att, def, perteAtt, perteDef };
  }

  function afficherRound(numRound, att, def, perteAtt, perteDef, pionsAtt, pionsDef) {
    const entries = document.getElementById('logEntries');
    const div = document.createElement('div');

    let borderClass = '';
    if (perteAtt > 0 && perteDef > 0) borderClass = 'both-loss';
    else if (perteAtt > 0) borderClass = 'att-loss';
    else borderClass = 'def-loss';

    div.className = 'round-entry ' + borderClass;

    const label = numRound === 1 ? '1er tour' : numRound + 'ème tour';

    let outcomeText = '';
    if (perteAtt > 0 && perteDef > 0) {
      outcomeText = `Chacun perd <b>${perteAtt} pion${perteAtt > 1 ? 's' : ''}</b>.`;
    } else if (perteAtt > 0) {
      outcomeText = `L'attaquant perd <b>${perteAtt} pion${perteAtt > 1 ? 's' : ''}</b>.`;
    } else {
      outcomeText = `Le défenseur perd <b>${perteDef} pion${perteDef > 1 ? 's' : ''}</b>.`;
    }

    div.innerHTML = `
      <div class="round-num">${label}</div>
      <div class="round-dice">
        <div class="dice-group att">
          <div class="who">Attaquant</div>
          <div class="dice-val">${arrayToString(att)}</div>
        </div>
        <div class="dice-group def">
          <div class="who">Défenseur</div>
          <div class="dice-val">${arrayToString(def)}</div>
        </div>
      </div>
      <div class="round-outcome">${outcomeText}</div>
      <div class="round-score">Reste : <b>${pionsAtt}</b> att. — <b>${pionsDef}</b> déf.</div>
    `;
    entries.prepend(div);
  }

  function afficherVictoire(pionsAtt, pionsDef) {
    const box = document.getElementById('resultFinal');
    const verdict = document.getElementById('verdictText');
    const sub = document.getElementById('verdictSub');
    box.classList.add('visible');

    if (pionsAtt <= 0) {
      box.className = 'result-final visible defenseur-win';
      verdict.textContent = 'Victoire du Défenseur';
      sub.textContent = `Il lui reste ${pionsDef} pion${pionsDef > 1 ? 's' : ''}.`;
    } else {
      box.className = 'result-final visible attaquant-win';
      verdict.textContent = 'Victoire de l\'Attaquant';
      sub.textContent = `Il lui reste ${pionsAtt} pion${pionsAtt > 1 ? 's' : ''}.`;
    }
  }

  function reset() {
    hideError();
    document.getElementById('resultFinal').classList.remove('visible');
    document.getElementById('logEntries').innerHTML = '';
    document.getElementById('logContainer').classList.remove('visible');
    document.getElementById('btnSuivant').classList.remove('visible');
  }

  function lancerCombat() {
    reset();

    const pAtt = parseInt(document.getElementById('pionsAtt').value) || 0;
    const pDef = parseInt(document.getElementById('pionsDef').value) || 0;
    const dAtt = parseInt(document.getElementById('desAtt').value) || 0;
    const dDef = parseInt(document.getElementById('desDef').value) || 0;

    if (!valider(pAtt, pDef, dAtt, dDef)) return;

    document.getElementById('logContainer').classList.add('visible');

    if (modeJeu === 2) {
      // Mode par étape
      pionsAttG = pAtt; pionsDefG = pDef;
      desAttG = dAtt; desDefG = dDef;
      ligneRound = 1;
      document.getElementById('btnSuivant').classList.add('visible');
      lancerSuivant();
    } else {
      // Mode instantané
      let pA = pAtt, pD = pDef, num = 1;
      while (pA > 0 && pD > 0) {
        const r = executerRound(pA, pD, dAtt, dDef);
        pA -= r.perteAtt;
        pD -= r.perteDef;
        afficherRound(num++, r.att, r.def, r.perteAtt, r.perteDef, Math.max(0,pA), Math.max(0,pD));
      }
      afficherVictoire(pA, pD);
    }
  }

  function lancerSuivant() {
    if (pionsAttG <= 0 || pionsDefG <= 0) {
      afficherVictoire(pionsAttG, pionsDefG);
      document.getElementById('btnSuivant').classList.remove('visible');
      return;
    }

    const r = executerRound(pionsAttG, pionsDefG, desAttG, desDefG);
    pionsAttG -= r.perteAtt;
    pionsDefG -= r.perteDef;
    afficherRound(ligneRound++, r.att, r.def, r.perteAtt, r.perteDef, Math.max(0,pionsAttG), Math.max(0,pionsDefG));

    if (pionsAttG <= 0 || pionsDefG <= 0) {
      afficherVictoire(pionsAttG, pionsDefG);
      document.getElementById('btnSuivant').classList.remove('visible');
    }
  }
</script>

</body>
</html>
